{% extends "base.html" %}
{% block title %}Reset Password{% endblock %}

{% block auth_content %}
<div class="w-full max-w-md">
    <div class="bg-white dark:bg-gray-800 py-8 px-6 shadow-lg rounded-lg">
        <div class="text-center mb-8">
            {% if APP_LOGO %}
            <img src="{{ url_for('api.uploaded_file', filename=APP_LOGO) }}" alt="{{ APP_NAME }}" class="h-12 mx-auto mb-3">
            {% endif %}
            <h1 class="text-3xl font-bold text-primary-600">{{ APP_NAME }}</h1>
            <p class="mt-2 text-sm text-gray-600 dark:text-gray-400">Set a new password</p>
        </div>

        <form method="POST" class="space-y-6">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 dark:text-gray-300">New Password</label>
                <input type="password" name="password" id="password" required
                       class="mt-1 block w-full rounded-md border border-gray-300 dark:border-gray-600 px-3 py-2 shadow-sm focus:border-primary-500 focus:outline-none focus:ring-1 focus:ring-primary-500">
            </div>

            <div>
                <label for="confirm_password" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Confirm Password</label>
                <input type="password" name="confirm_password" id="confirm_password" required
                       class="mt-1 block w-full rounded-md border border-gray-300 dark:border-gray-600 px-3 py-2 shadow-sm focus:border-primary-500 focus:outline-none focus:ring-1 focus:ring-primary-500">
            </div>

            <button type="submit"
                    class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-primary-600 hover:bg-primary-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-500">
                Reset Password
            </button>
        </form>

        <p class="mt-6 text-center text-sm text-gray-600 dark:text-gray-400">
            <a href="{{ url_for('auth.login') }}" class="font-medium text-primary-600 hover:text-primary-500">Back to login</a>
        </p>
    </div>
</div>
{% endblock %}
